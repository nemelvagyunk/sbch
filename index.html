<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="app.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />

      <div class="row" id="row1">
        <div id="modeGroup" class="group"></div>
      </div>
      <div class="row" id="row2">
        <div id="heroGroup" class="group"></div>
      </div>
      <div class="row" id="row3">
        <div id="villainGroup" class="group"></div>
      </div>
      <div class="row" id="row4">
        <div id="sizeGroup" class="group"></div>
      </div>
    </div>
    <div class="frame">
      <img id="chartImg" alt="poker chart" />
    </div>
    <div class="appNav">
      <a href="index.html" class="btn appNavBtn appNavBtn--active">SB ANTE</a>
      <a href="noante.html" class="btn appNavBtn">NO ANTE</a>

  <script>
    window.__APP_VERSION__ = "2026-03-09-01";
    window.__APP_MODE__    = "ante";
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js"); }

  <script src="app.js?v=2026-03-09-01"></script>
